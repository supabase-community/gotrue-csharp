# Supabase CLI stack backing the GotrueTests suites.
# Only api (Kong), db, auth, and local smtp are enabled; everything else is switched off to
# keep `supabase start` fast in CI. Keys/URL are the CLI defaults expected by
# GotrueTests/Support/TestClients.cs (overridable via SUPABASE_CLI_AUTH_URL /
# SUPABASE_CLI_ANON_KEY / SUPABASE_CLI_JWT_SECRET).
# Auth settings mirror what the legacy docker-compose gotrue enabled: email/phone autoconfirm,
# anonymous sign-ins, manual linking, GitHub as a dummy external provider, and TOTP MFA.
# Rate limits are raised because the suite performs hundreds of sign-ups per run.
project_id = "gotrue-csharp"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[db.migrations]
enabled = true

[db.seed]
enabled = false

[realtime]
enabled = false

[studio]
enabled = false

[local_smtp]
enabled = true
port = 54324

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = true
enable_manual_linking = true

[auth.rate_limit]
email_sent = 100
sign_in_sign_ups = 1000
anonymous_users = 1000
token_refresh = 1000
token_verifications = 1000

[auth.email]
enable_signup = true
enable_confirmations = false

[auth.sms]
enable_signup = true
enable_confirmations = false

[auth.sms.twilio]
enabled = true
account_sid = "test-account-sid"
message_service_sid = "test-service-sid"
auth_token = "test-auth-token"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.external.github]
enabled = true
client_id = "myappclientid"
secret = "clientsecretvaluessssh"
redirect_uri = "http://localhost:3000/callback"

[edge_runtime]
enabled = false

[analytics]
enabled = false
